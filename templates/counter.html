<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物体カウンター</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      color: #2d2d2d;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    .drop-zone {
      border: 2px dashed #c8c8c0;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone.over {
      border-color: #4a90d9;
      background: #f0f7ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .drop-zone-text { color: #888; font-size: 0.9rem; }

    #preview-wrap { margin-top: 16px; display: none; }

    #preview {
      max-width: 100%;
      max-height: 280px;
      border-radius: 8px;
      object-fit: contain;
    }

    .field { margin-top: 20px; }

    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d0d0c8;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #4a90d9; }

    button[type="submit"] {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover { background: #3a7bc8; }
    button[type="submit"]:disabled { background: #a0b8d8; cursor: not-allowed; }

    #result {
      margin-top: 24px;
      display: none;
    }

    .result-count {
      text-align: center;
      font-size: 4rem;
      font-weight: 700;
      color: #4a90d9;
      line-height: 1;
    }

    .result-unit {
      text-align: center;
      font-size: 1.2rem;
      color: #888;
      margin-top: 4px;
    }

    .result-description {
      margin-top: 12px;
      background: #f5f5f0;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #555;
      line-height: 1.6;
    }

    .error-msg {
      margin-top: 12px;
      color: #d0421b;
      font-size: 0.9rem;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>📷 物体カウンター</h1>
  <p class="subtitle">写真をアップロードして、数えたいものを指定するだけ</p>

  <div class="card">
    <form id="form">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" name="image" accept="image/*">
        <div class="drop-zone-icon">🖼️</div>
        <div class="drop-zone-text">クリックまたはドラッグ＆ドロップで画像を選択<br><small>PNG / JPG / GIF / WebP（最大16MB）</small></div>
      </div>

      <div id="preview-wrap">
        <img id="preview" src="" alt="プレビュー">
      </div>

      <div class="field">
        <label for="target">数える対象</label>
        <input type="text" id="target" name="target" placeholder="例：りんご、人、車、ネコ…" autocomplete="off">
      </div>

      <button type="submit" id="submit-btn">カウントする</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewWrap = document.getElementById('preview-wrap');
    const preview = document.getElementById('preview');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submit-btn');

    function showPreview(file) {
      if (!file) return;
      const url = URL.createObjectURL(file);
      preview.src = url;
      previewWrap.style.display = 'block';
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) showPreview(fileInput.files[0]);
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('over');
      const file = e.dataTransfer.files[0];
      if (file) { fileInput.files = e.dataTransfer.files; showPreview(file); }
    });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      resultDiv.style.display = 'none';
      resultDiv.innerHTML = '';

      const file = fileInput.files[0];
      const target = document.getElementById('target').value.trim();

      if (!file) { showError('画像を選択してください'); return; }
      if (!target) { showError('数える対象を入力してください'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>解析中…';

      const data = new FormData();
      data.append('image', file);
      data.append('target', target);

      try {
        const res = await fetch('/count', { method: 'POST', body: data });
        const json = await res.json();
        if (!res.ok) { showError(json.error || 'エラーが発生しました'); return; }
        showResult(json, target);
      } catch {
        showError('通信エラーが発生しました');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'カウントする';
      }
    });

    function showResult({ count, description }, target) {
      resultDiv.innerHTML = `
        <div class="result-count">${count}</div>
        <div class="result-unit">「${target}」の個数</div>
        ${description ? `<div class="result-description">${escHtml(description)}</div>` : ''}
      `;
      resultDiv.style.display = 'block';
    }

    function showError(msg) {
      resultDiv.innerHTML = `<div class="error-msg">⚠️ ${escHtml(msg)}</div>`;
      resultDiv.style.display = 'block';
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
